<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Страница не найдена — MzissanaEnglish</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1a2e4a;
        background: #fafaf7;
      }

      * { box-sizing: border-box; }
      body { min-width: 320px; min-height: 100vh; margin: 0; }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background:
          radial-gradient(circle at 12% 18%, rgba(245, 170, 188, 0.22) 0 12rem, transparent 12.1rem),
          radial-gradient(circle at 88% 80%, rgba(196, 181, 244, 0.25) 0 14rem, transparent 14.1rem),
          #fafaf7;
      }

      section { max-width: 680px; text-align: center; }
      img { width: 72px; height: 72px; object-fit: contain; }
      .code { margin: 20px 0 0; color: #9b8bd1; font-size: clamp(4rem, 18vw, 8rem); font-weight: 800; line-height: 0.9; }
      h1 { margin: 20px 0 0; font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.08; }
      p { max-width: 540px; margin: 20px auto 0; color: rgba(26, 46, 74, 0.68); font-size: 1.1rem; line-height: 1.65; }
      nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 30px; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 22px;
        border: 2px solid rgba(26, 46, 74, 0.18);
        border-radius: 999px;
        color: #1a2e4a;
        background: rgba(255, 255, 255, 0.86);
        font-weight: 700;
        text-decoration: none;
      }
      a:first-child { border-color: #1a2e4a; color: #fff; background: #1a2e4a; }
      a:focus-visible { outline: 3px solid #f5aabc; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <section aria-labelledby="not-found-title">
        <img src="/images/mzissana-eng-mark.png" alt="" />
        <p class="code" aria-hidden="true">404</p>
        <h1 id="not-found-title">Страница не найдена</h1>
        <p>Возможно, адрес изменился или в нём допущена ошибка. Вернитесь на главную страницу или откройте материалы по английскому языку.</p>
        <nav aria-label="Полезные ссылки">
          <a href="/">На главную</a>
          <a href="/extra">Открыть материалы</a>
        </nav>
      </section>
    </main>
  </body>
</html>
