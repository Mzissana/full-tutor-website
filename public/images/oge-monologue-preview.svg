    <rect x="96" y="511" width="1008" height="80" rx="20" fill="#4ADE80" fill-opacity="0.1" stroke="#4ADE80" stroke-opacity="0.35"/>
    <text x="130" y="544" fill="#4ADE80" font-size="16" font-weight="700">LEVEL 4</text><text x="130" y="572" fill="#EEEEF4" font-size="24" font-weight="700">Write</text>
