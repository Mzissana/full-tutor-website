      <circle cx="42" cy="113" r="17" fill="#93c8ee"/><text x="37" y="119" fill="#1a2e4a">4</text><text x="70" y="119" fill="#1a2e4a">Пункта плана</text>
      <circle cx="42" cy="151" r="17" fill="#a8d5b2"/><text x="37" y="157" fill="#1a2e4a">✓</text><text x="70" y="157" fill="#1a2e4a">Заключение</text>
