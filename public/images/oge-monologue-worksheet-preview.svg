  <text x="94" y="96" fill="#c4b5f4" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">ЗАДАНИЕ 3 · УСТНАЯ ЧАСТЬ</text>
  <text x="94" y="139" fill="#fff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Монолог без заучивания</text>
  <g transform="translate(94 215)">
